<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Room</title>
    <style>
      :root {
        --bg: #0d1117; --panel: #161b22; --border: #30363d;
        --text: #e6edf3; --muted: #8b949e; --accent: #2f81f7; --ok: #3fb950; --err: #f85149;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column;
      }
      header {
        padding: 10px 16px; border-bottom: 1px solid var(--border);
        display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      }
      header h1 { font-size: 15px; margin: 0; font-weight: 600; }
      header a { color: var(--accent); text-decoration: none; font-size: 12px; }
      #roomLabel { color: var(--accent); }
      .spacer { flex: 1; }
      #roomForm { display: flex; align-items: center; gap: 6px; }
      #roomForm label { font-size: 12px; color: var(--muted); }
      #roomInput { width: 130px; padding: 3px 6px; font-size: 12px; }
      #status { font-size: 12px; padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border); color: var(--muted); }
      #status.ready { color: var(--ok); border-color: var(--ok); }
      #status.building { color: var(--accent); border-color: var(--accent); }
      #status.error { color: var(--err); border-color: var(--err); }
      #version { color: var(--muted); font-size: 12px; }
      main { flex: 1; display: flex; gap: 1px; background: var(--border); overflow: hidden; }
      .col { background: var(--bg); display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
      .col.primary { flex: 1; }
      .col.drawer { width: 40%; min-width: 320px; }
      .col.drawer.hidden { display: none; }
      .section { border-bottom: 1px solid var(--border); padding: 10px 14px; }
      .section.grow { flex: 1; display: flex; flex-direction: column; min-height: 0; }
      .section h2 { font-size: 12px; text-transform: uppercase; color: var(--muted); margin: 0 0 8px; letter-spacing: .05em; }
      textarea, input, select {
        width: 100%; background: var(--panel); color: var(--text);
        border: 1px solid var(--border); border-radius: 6px; padding: 8px; font-family: inherit; font-size: 13px;
      }
      #editor { flex: 1; resize: none; min-height: 200px; }
      .tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; max-height: 84px; overflow: auto; }
      .tab { font-size: 12px; padding: 3px 8px; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; color: var(--muted); white-space: nowrap; }
      .tab.active { color: var(--text); border-color: var(--accent); }
      button {
        background: var(--accent); color: #fff; border: none; border-radius: 6px;
        padding: 7px 12px; font-family: inherit; font-size: 13px; cursor: pointer;
      }
      button.ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
      button.ghost.on { border-color: var(--accent); color: var(--accent); }
      button:disabled { opacity: .5; cursor: not-allowed; }
      .is-hidden { display: none !important; }
      /* Editor chrome is hidden until you press "Edit"; the room shows just the
         live app (the game) by default. In edit mode nothing here forces a
         display value, so per-panel toggles (.is-hidden) keep working. */
      body:not(.editing) .edit-only { display: none !important; }
      .row { display: flex; gap: 8px; align-items: center; }
      .row > input, .row > select { flex: 1; }
      #preview { flex: 1; margin: 0; padding: 12px; background: var(--panel); overflow: auto; white-space: pre-wrap; font-size: 13px; border: 0; }
      ul { list-style: none; margin: 0; padding: 0; overflow: auto; }
      li { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; gap: 8px; }
      li.active-version { color: var(--accent); }
      li .meta { color: var(--muted); }
      .hint { color: var(--muted); font-size: 12px; margin: 4px 0 0; }
      /* Chat panel */
      #chatStatus { text-transform: none; letter-spacing: 0; font-weight: 400; }
      .chat-log { flex: 1; overflow: auto; display: flex; flex-direction: column; gap: 10px; padding: 4px 2px; min-height: 120px; }
      .msg { border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 13px; white-space: pre-wrap; word-break: break-word; }
      .msg.user { border-color: var(--accent); background: rgba(47,129,247,0.08); }
      .msg.assistant { background: var(--panel); }
      .msg .who { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
      .msg .tools { margin-top: 6px; display: flex; flex-direction: column; gap: 3px; }
      .tool-chip { font-size: 11px; color: var(--muted); border-left: 2px solid var(--border); padding: 1px 0 1px 8px; font-family: inherit; }
      .tool-chip.done { color: var(--ok); border-color: var(--ok); }
      .tool-chip.err { color: var(--err); border-color: var(--err); }
      #chatInput { flex: 1; resize: vertical; }
      /* Resources panel */
      .res-group { border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; }
      .res-group > h3 { font-size: 12px; margin: 0 0 4px; display: flex; align-items: center; gap: 8px; }
      .res-group .desc { color: var(--muted); font-size: 12px; margin: 0 0 8px; }
      .badge { font-size: 10px; text-transform: uppercase; letter-spacing: .04em; padding: 1px 6px; border-radius: 8px; border: 1px solid var(--border); color: var(--muted); }
      .badge.on { color: var(--accent); border-color: var(--accent); }
      .badge.ok { color: var(--ok); border-color: var(--ok); }
      .badge.off { color: var(--err); border-color: var(--err); }
      .res-grid { display: grid; grid-template-columns: 1fr auto; gap: 6px 8px; align-items: center; }
      .res-grid label { font-size: 12px; color: var(--muted); }
      .res-grid input { width: 140px; }
      .res-field { margin-bottom: 8px; }
      .res-field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 3px; }
      .res-actions { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
      .res-hint { font-size: 11px; color: var(--muted); }
      .res-hint.ok { color: var(--ok); } .res-hint.err { color: var(--err); }
      .secret-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; padding: 4px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
    </style>
  </head>
  <body>
    <header>
      <h1>room: <span id="roomLabel"></span></h1>
      <a href="/" title="Back to the lobby">&larr; lobby</a>
      <button class="ghost" id="editToggle" title="Show/hide the code + AI tools">Edit</button>
      <button class="ghost" id="copyLink" title="Copy this room's link">Copy link</button>
      <span class="spacer"></span>
      <!-- Everything below is editor chrome: hidden until "Edit" is pressed. -->
      <span id="status" class="edit-only">loading…</span>
      <span id="version" class="edit-only"></span>
      <button class="ghost on edit-only" id="toggleControls">Controls</button>
      <button class="ghost on edit-only" id="toggleChat">Chat</button>
      <button class="ghost edit-only" id="toggleCode">Code</button>
      <button class="ghost edit-only" id="toggleResources">Resources</button>
      <button class="ghost edit-only" id="toggleHistory">History</button>
    </header>
    <main>
      <!-- Primary: the live app (preview). AI + controls appear in edit mode. -->
      <div class="col primary">
        <div class="section edit-only" id="controlsSection">
          <h2>Run / Preview</h2>
          <div class="row">
            <input id="path" value="/" />
            <button id="run">Run</button>
            <button class="ghost on" id="viewMode" title="Toggle rendered/raw">Rendered</button>
            <button class="ghost" id="reset" title="Re-seed from the template">Reset app</button>
          </div>
        </div>
        <div id="previewWrap" style="flex:1; display:flex; min-height:0;">
          <iframe id="previewFrame" title="app preview"
            style="flex:1; border:0; background:#fff;"
            sandbox="allow-scripts allow-forms allow-same-origin"></iframe>
          <pre id="preview" style="display:none;">Run the app to see output…</pre>
        </div>
      </div>

      <!-- Drawer: code editor. Hidden by default; toggle with "Code". -->
      <div class="col drawer hidden edit-only" id="codeDrawer">
        <div class="section grow">
          <h2>Files</h2>
          <div class="tabs" id="tabs"></div>
          <textarea id="editor" spellcheck="false"></textarea>
          <div class="row" style="margin-top:8px;">
            <button id="save">Save (new version)</button>
            <button class="ghost" id="reload">Reload</button>
            <span class="hint" id="saveHint"></span>
          </div>
        </div>
      </div>

      <!-- Drawer: resources/capabilities + per-app config. Toggle "Resources". -->
      <div class="col drawer hidden edit-only" id="resourcesDrawer">
        <div class="section grow" style="overflow:auto;">
          <h2>Resources <span id="resStatus" class="meta"></span></h2>
          <div id="resBody">loading…</div>
        </div>
      </div>

      <!-- Drawer: version history. Hidden by default; toggle with "History". -->
      <div class="col drawer hidden edit-only" id="historyDrawer">
        <div class="section grow">
          <h2>Versions</h2>
          <ul id="versions"></ul>
        </div>
      </div>

      <!-- Drawer: AI chat. The agentic coding assistant (Think). Open by default
           in edit mode; toggle with "Chat". -->
      <div class="col drawer edit-only" id="chatDrawer">
        <div class="section grow">
          <h2>AI coding assistant <span id="chatStatus" class="meta"></span></h2>
          <div id="chatLog" class="chat-log"></div>
          <div class="row" style="margin-top:8px;">
            <textarea id="chatInput" rows="2" placeholder="Describe a change, or ask about the app… (Enter to send, Shift+Enter for newline)"></textarea>
            <button id="chatSend">Send</button>
          </div>
        </div>
      </div>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      let files = [];
      let activePath = null; // track selected file by path, survives reloads
      let liveVersion = 0;

      // ── Room: this page IS one room (one DO) — the live app by default, with
      // the code/AI/history tools revealed on demand via "Edit". Read from
      // ?room= (default "main"), sanitized to match the host. Every /api/* and
      // /preview/* call carries it, so edits/previews target this room only.
      const ROOM = (() => {
        const raw = new URLSearchParams(location.search).get("room") || "main";
        return raw.replace(/[^A-Za-z0-9_-]/g, "").slice(0, 64) || "main";
      })();
      // Append ?room= to a same-origin path (preserving any existing query).
      function withRoom(path) {
        return path + (path.includes("?") ? "&" : "?") + "room=" + encodeURIComponent(ROOM);
      }
      $("roomLabel").textContent = ROOM;
      document.title = "Room " + ROOM;

      // Per-TAB player identity. Each tab gets its own id so opening the room in
      // several tabs = several players. We write it into THIS tab's address bar
      // (replaceState, no navigation) so it survives a reload and a "reopen
      // closed tab" — restoring the URL restores the id, which resumes the seat.
      // A freshly-typed room URL (no player=) mints a new id => a new player.
      // The "Copy link" button intentionally omits player=, so sharing the room
      // never clones your seat onto someone else.
      const PLAYER = (() => {
        const params = new URLSearchParams(location.search);
        let p = (params.get("player") || "").replace(/[^A-Za-z0-9_-]/g, "").slice(0, 64);
        if (!p) {
          p = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random().toString(36).slice(2)).replace(/[^A-Za-z0-9_-]/g, "");
          params.set("player", p);
          history.replaceState(null, "", location.pathname + "?" + params.toString() + location.hash);
        }
        return p;
      })();

      // ── Edit mode: reveal/hide all editor chrome. Off by default so a fresh
      // room is just the game.
      $("editToggle").onclick = () => {
        const editing = document.body.classList.toggle("editing");
        $("editToggle").textContent = editing ? "Done" : "Edit";
        $("editToggle").classList.toggle("on", editing);
        // Open the assistant + live-status connections the first time the tools
        // are revealed (both are edit-only chrome).
        if (editing) { Chat.connect(); StateFeed.connect(); }
      };

      $("copyLink").onclick = async () => {
        const link = location.origin + "/room?room=" + encodeURIComponent(ROOM);
        try { await navigator.clipboard.writeText(link); $("copyLink").textContent = "Copied!"; }
        catch { prompt("Copy this room link:", link); }
        setTimeout(() => { $("copyLink").textContent = "Copy link"; }, 1500);
      };

      async function api(path, opts) {
        const res = await fetch(withRoom(path), opts);
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || res.statusText);
        return data;
      }

      // ── Panel toggles ──
      function toggleDrawer(drawerId, btn) {
        const drawer = $(drawerId);
        const hidden = drawer.classList.toggle("hidden");
        btn.classList.toggle("on", !hidden);
      }
      $("toggleCode").onclick = () => toggleDrawer("codeDrawer", $("toggleCode"));
      $("toggleHistory").onclick = () => toggleDrawer("historyDrawer", $("toggleHistory"));
      $("toggleChat").onclick = () => toggleDrawer("chatDrawer", $("toggleChat"));
      $("toggleResources").onclick = () => {
        toggleDrawer("resourcesDrawer", $("toggleResources"));
        if (!$("resourcesDrawer").classList.contains("hidden")) Resources.load();
      };

      // Toggle in-column sections (top controls bar). Visible by default in edit
      // mode; hiding it gives the preview more room.
      function toggleSection(id, btn) {
        const hidden = $(id).classList.toggle("is-hidden");
        btn.classList.toggle("on", !hidden);
      }
      $("toggleControls").onclick = () => toggleSection("controlsSection", $("toggleControls"));

      // ── File editor ──
      function currentIndex() {
        const i = files.findIndex((f) => f.path === activePath);
        return i === -1 ? 0 : i;
      }
      function renderTabs() {
        $("tabs").innerHTML = "";
        files.forEach((f) => {
          const el = document.createElement("span");
          el.className = "tab" + (f.path === activePath ? " active" : "");
          el.textContent = f.path;
          el.onclick = () => { saveBuffer(); activePath = f.path; showActive(); };
          $("tabs").appendChild(el);
        });
      }
      function showActive() {
        const f = files[currentIndex()];
        $("editor").value = f ? f.content : "";
        renderTabs();
      }
      function saveBuffer() {
        const i = currentIndex();
        if (files[i]) files[i].content = $("editor").value;
      }

      // Reloads authoritative files from the server. Always called after any
      // action that changes the live version (save, AI edit, rollback).
      async function loadFiles() {
        const { files: f } = await api("/api/files");
        files = f;
        if (!files.some((x) => x.path === activePath)) {
          activePath = files[0]?.path ?? null;
        }
        showActive();
      }

      async function loadState() {
        const s = await api("/api/state");
        liveVersion = s.activeVersion;
        const el = $("status");
        el.textContent = s.status;
        el.className = s.status + " edit-only";
        $("version").textContent = "live: v" + s.activeVersion;
      }

      async function loadVersions() {
        const { versions } = await api("/api/versions");
        $("versions").innerHTML = "";
        versions.forEach((v) => {
          const li = document.createElement("li");
          if (v.id === liveVersion) li.className = "active-version";
          const label = document.createElement("span");
          label.innerHTML = `v${v.id} <span class="meta">— ${v.note}</span>`;
          const btn = document.createElement("button");
          btn.className = "ghost";
          btn.textContent = v.id === liveVersion ? "live" : "rollback";
          btn.disabled = v.id === liveVersion;
          btn.onclick = async () => {
            await api("/api/rollback", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ version: v.id }) });
            await syncAll();
          };
          li.append(label, btn);
          $("versions").appendChild(li);
        });
      }

      // Full refresh: state + versions + the editor buffer. Keeps the code panel
      // following the live version.
      async function refreshAll() {
        await loadState();
        await Promise.all([loadVersions(), loadFiles()]);
      }

      // ── Live status feed (Agents cf_agent_state) ──
      // A READ-ONLY WebSocket to this room's AppHost that rides the Agents state
      // protocol: on connect and on every server-side setState, AppHost pushes a
      // {type:"cf_agent_state"} frame with {activeVersion,status,lastError}. This
      // keeps the editor header live when the version changes WITHOUT us doing an
      // action — e.g. the assistant promotes a build, or another tab edits the
      // room. We pass ?spectate=1 so AppHost does NOT enrol us as a game player
      // (no seat, no presence). The on-load /api/state fetch (in syncAll) remains
      // the fallback if this socket never opens.
      const StateFeed = (() => {
        let ws = null;
        function wsUrl() {
          const proto = location.protocol === "https:" ? "wss" : "ws";
          return proto + "://" + location.host + "/agents/app-host/" +
            encodeURIComponent(ROOM) + "?spectate=1";
        }
        function apply(state) {
          if (!state || typeof state.activeVersion !== "number") return;
          liveVersion = state.activeVersion;
          const el = $("status");
          el.textContent = state.status;
          el.className = state.status + " edit-only";
          $("version").textContent = "live: v" + state.activeVersion;
          // Keep the history list's "live" marker current if it's open. We do NOT
          // touch the code buffer or preview here — that would clobber an edit in
          // progress; the live game reloads itself via the coordinator's reload
          // frame, and manual "Reload" re-syncs the editor on demand.
          if (!$("historyDrawer").classList.contains("hidden")) {
            loadVersions().catch(() => {});
          }
        }
        function connect() {
          if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
          ws = new WebSocket(wsUrl());
          ws.addEventListener("message", (ev) => {
            let m; try { m = JSON.parse(ev.data); } catch { return; }
            if (m.type === "cf_agent_state") apply(m.state);
          });
          // Auto-reconnect so live status survives brief drops (e.g. DO restart).
          ws.addEventListener("close", () => { ws = null; setTimeout(connect, 2000); });
          ws.addEventListener("error", () => { try { ws.close(); } catch {} });
        }
        return { connect };
      })();

      // ── Actions ──
      $("save").onclick = async () => {
        saveBuffer();
        $("saveHint").textContent = "saving…";
        try {
          const { version } = await api("/api/files", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ files }) });
          $("saveHint").textContent = "saved as v" + version;
          await syncAll();
        } catch (e) { $("saveHint").textContent = "error: " + e.message; }
      };

      $("reload").onclick = async () => { await syncAll(); $("saveHint").textContent = "reloaded"; };

      // ── AI coding assistant (Think) ──
      // A per-room CodeAssistant Durable Object, reached over the Agents chat
      // WebSocket protocol (cf_agent_chat_*). It calls host-side tools that edit
      // THIS room's app through the build-gated version store, so any change it
      // makes shows up in the live preview / history exactly like a manual edit.
      const Chat = (() => {
        let ws = null;
        let committed = [];   // authoritative transcript from the server
        let pending = null;   // optimistic user message for the in-flight turn
        let live = null;      // streaming assistant message for the in-flight turn
        let busy = false;
        let reqId = null;

        function wsUrl() {
          const proto = location.protocol === "https:" ? "wss" : "ws";
          return proto + "://" + location.host + "/agents/code-assistant/" +
            encodeURIComponent(ROOM);
        }

        function setStatus(t) { $("chatStatus").textContent = t ? "— " + t : ""; }

        function connect() {
          if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
          setStatus("connecting…");
          ws = new WebSocket(wsUrl());
          ws.addEventListener("open", () => setStatus(""));
          ws.addEventListener("close", () => setStatus("disconnected"));
          ws.addEventListener("error", () => setStatus("connection error"));
          ws.addEventListener("message", onFrame);
        }

        // Convert a stored UIMessage (from cf_agent_chat_messages) to our shape.
        function fromUiMessage(m) {
          const text = (m.parts || []).filter((p) => p.type === "text").map((p) => p.text).join("");
          const tools = (m.parts || [])
            .filter((p) => typeof p.type === "string" && (p.type.startsWith("tool-") || p.type === "dynamic-tool"))
            .map((p) => ({
              name: p.toolName || (p.type.startsWith("tool-") ? p.type.slice(5) : "tool"),
              input: p.input, output: p.output,
              ok: p.state ? p.state !== "output-error" : true
            }));
          return { role: m.role, text, tools };
        }

        function onFrame(ev) {
          let m; try { m = JSON.parse(ev.data); } catch { return; }
          if (m.type === "cf_agent_chat_messages") {
            // The SERVER is the single source of truth for the transcript. Adopt
            // its authoritative history and drop our optimistic overlays that it
            // now contains (this is what prevents duplicated/re-pasted prompts).
            committed = (m.messages || []).map(fromUiMessage).filter((x) => x.role === "user" || x.role === "assistant");
            pending = null;
            if (!busy) live = null;
            render();
            return;
          }
          if (m.type !== "cf_agent_use_chat_response" || m.id !== reqId) return;
          if (m.error) { finishTurn("error: " + (m.body || "unknown")); return; }
          if (m.body && m.body.trim()) {
            try { handleChunk(JSON.parse(m.body)); } catch {}
          }
          if (m.done) finishTurn();
        }

        // AI SDK UIMessageChunk stream → the live assistant bubble.
        function handleChunk(c) {
          if (!live) live = { role: "assistant", text: "", tools: [] };
          switch (c.type) {
            case "text-delta": live.text += (c.delta || c.text || ""); break;
            case "tool-input-available":
            case "tool-call": {
              const name = c.toolName || c.toolCallName || "tool";
              live.tools.push({ name, input: c.input || c.args, output: undefined, ok: undefined, id: c.toolCallId });
              break;
            }
            case "tool-output-available":
            case "tool-result": {
              const t = [...live.tools].reverse().find((x) => x.output === undefined && (!c.toolCallId || x.id === c.toolCallId));
              if (t) { t.output = c.output ?? c.result; t.ok = !(t.output && t.output.error) && !(t.output && t.output.applied === false); }
              break;
            }
          }
          render();
        }

        function newId() { return crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()); }

        function send() {
          const text = $("chatInput").value.trim();
          if (!text || busy) return;
          connect();
          const doSend = () => {
            reqId = newId();
            // Send ONLY the new user message — the server already holds the rest
            // of the conversation (Session) and uses it as context. Re-sending the
            // whole transcript (esp. with fresh ids) is what caused duplicates.
            const userMsg = { id: newId(), role: "user", parts: [{ type: "text", text }] };
            pending = { role: "user", text, tools: [] };
            live = null;
            busy = true; setStatus("thinking…"); $("chatSend").disabled = true;
            $("chatInput").value = "";
            render();
            ws.send(JSON.stringify({
              id: reqId,
              init: { method: "POST", body: JSON.stringify({ messages: [userMsg], trigger: "submit-user-message" }) },
              type: "cf_agent_use_chat_request"
            }));
          };
          if (ws.readyState === WebSocket.OPEN) doSend();
          else ws.addEventListener("open", doSend, { once: true });
        }

        async function finishTurn(errText) {
          busy = false;
          $("chatSend").disabled = false;
          // If the model produced nothing visible, say so instead of a blank bubble.
          if (live && !live.text && (!live.tools || live.tools.length === 0)) {
            live.text = "(the model stopped without a reply — try rephrasing, or ask for a smaller step)";
          }
          // Fold optimistic overlays into the transcript so nothing flickers before
          // the server's authoritative cf_agent_chat_messages frame arrives.
          if (pending) { committed.push(pending); pending = null; }
          if (live) { committed.push(live); live = null; }
          setStatus(errText || "");
          render();
          // A turn may have changed the live version — refresh preview/state/history.
          try { await syncAll(); } catch {}
        }

        function render() {
          const log = $("chatLog");
          log.innerHTML = "";
          const all = committed.concat(pending ? [pending] : [], live ? [live] : []);
          for (const m of all) {
            if (m.role !== "user" && m.role !== "assistant") continue;
            const el = document.createElement("div");
            el.className = "msg " + m.role;
            const who = document.createElement("div");
            who.className = "who";
            who.textContent = m.role === "user" ? "you" : "assistant";
            el.appendChild(who);
            if (m.text) { const body = document.createElement("div"); body.textContent = m.text; el.appendChild(body); }
            if (m.tools && m.tools.length) {
              const tools = document.createElement("div");
              tools.className = "tools";
              for (const t of m.tools) {
                const chip = document.createElement("div");
                const done = t.output !== undefined;
                chip.className = "tool-chip" + (done ? (t.ok ? " done" : " err") : "");
                let label = "\u2699 " + t.name;
                if (t.name === "apply_line_edits" || t.name === "save_version" || t.name === "reset_app") {
                  if (done && t.output && typeof t.output.version === "number") {
                    label += t.output.built ? "  \u2192 v" + t.output.version + " (live)" :
                      "  \u2192 v" + t.output.version + " (build failed)";
                  }
                } else if (done && t.output && t.output.error) {
                  label += "  \u2717";
                }
                chip.textContent = done ? label : label + "…";
                tools.appendChild(chip);
              }
              el.appendChild(tools);
            }
            log.appendChild(el);
          }
          log.scrollTop = log.scrollHeight;
        }

        $("chatSend").onclick = send;
        $("chatInput").addEventListener("keydown", (e) => {
          if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
        });

        return { connect };
      })();

      let rendered = true; // "Rendered" (iframe) vs "Raw" (text) preview

      function previewUrl() {
        const path = $("path").value || "/";
        let url = withRoom("/preview" + (path.startsWith("/") ? path : "/" + path));
        // Forward this tab's per-tab player id to the app so each tab is a
        // distinct player (and reload/reopen resumes the same seat).
        if (PLAYER) url += "&player=" + encodeURIComponent(PLAYER);
        return url;
      }

      $("viewMode").onclick = () => {
        rendered = !rendered;
        $("viewMode").textContent = rendered ? "Rendered" : "Raw";
        $("viewMode").classList.toggle("on", rendered);
        $("previewFrame").style.display = rendered ? "block" : "none";
        $("preview").style.display = rendered ? "none" : "block";
        runApp();
      };

      async function runApp() {
        const url = previewUrl();
        if (rendered) {
          // Real page load: the app's HTML renders and its buttons/JS work.
          // Relative links/fetches resolve under /preview/. A cache-buster
          // forces the iframe to actually reload (setting the same src is a
          // no-op in some browsers), so the view always matches the live code.
          const bust = (url.includes("?") ? "&" : "?") + "_=" + Date.now();
          $("previewFrame").src = url + bust;
        } else {
          $("preview").textContent = "running…";
          try {
            const res = await fetch(url);
            const body = await res.text();
            $("preview").textContent = `HTTP ${res.status}\n\n${body}`;
          } catch (e) { $("preview").textContent = "error: " + e.message; }
        }
        await loadState();
      }

      // Refresh state/versions/code AND re-render the preview, so the rendered
      // view always reflects the live version after any change.
      async function syncAll() {
        await refreshAll();
        await runApp();
      }

      $("run").onclick = runApp;

      $("reset").onclick = async () => {
        if (!confirm("Re-seed this room from its template as a new version?")) return;
        try { await api("/api/reset", { method: "POST" }); await syncAll(); }
        catch (e) { alert("Reset failed: " + e.message); }
      };

      $("editor").addEventListener("keydown", (e) => {
        if (e.key === "Tab") { e.preventDefault(); const t = e.target; const s = t.selectionStart; t.value = t.value.slice(0, s) + "  " + t.value.slice(t.selectionEnd); t.selectionStart = t.selectionEnd = s + 2; }
      });

      // ── Resources panel ──
      // Renders the capability catalog (from the server's manifest — the single
      // source of truth) plus this app's per-app config: resource limits, egress
      // allowlist, secrets (names only), and email policy. Reads one snapshot via
      // GET /api/resources; writes through the existing POST /api/{limits,egress,
      // secrets,email} routes, then reloads. Nothing here is app-reachable — it's
      // trusted host config surfaced in the editor chrome.
      const Resources = (() => {
        // Tiny DOM helper: el("div", {class:"x"}, [child, "text"]).
        function el(tag, props, kids) {
          const n = document.createElement(tag);
          for (const [k, v] of Object.entries(props || {})) {
            if (k === "class") n.className = v;
            else if (k === "text") n.textContent = v;
            else if (k.startsWith("on") && typeof v === "function") n[k] = v;
            else if (v != null) n.setAttribute(k, v);
          }
          for (const kid of [].concat(kids || [])) {
            if (kid == null) continue;
            n.append(kid.nodeType ? kid : document.createTextNode(String(kid)));
          }
          return n;
        }
        // Human labels for the AppLimits keys (falls back to the raw key).
        const LIMIT_LABELS = {
          cpuMs: "CPU per run (ms)", subRequests: "Sub-requests per run",
          fetchTimeoutMs: "Fetch timeout (ms)", fetchMaxBytes: "Fetch max bytes",
          fetchMaxRedirects: "Fetch max redirects", storeMaxValueBytes: "Store max value (bytes)",
          storeMaxTotalBytes: "Store max total (bytes)", emailPerDay: "Email per day"
        };
        function status(msg, cls) {
          const s = $("resStatus");
          s.textContent = msg ? "— " + msg : "";
          s.className = "meta " + (cls || "");
        }

        // Resource limits: one number input per AppLimits key; Save posts them all
        // (the server clamps + merges).
        function limitsGroup(limits) {
          const grid = el("div", { class: "res-grid" });
          const inputs = {};
          for (const [key, val] of Object.entries(limits)) {
            inputs[key] = el("input", { type: "number", min: "0", value: String(val) });
            grid.append(el("label", { text: LIMIT_LABELS[key] || key }), inputs[key]);
          }
          const hint = el("span", { class: "res-hint" });
          const save = el("button", { text: "Save limits", onclick: async () => {
            const patch = {};
            for (const [k, inp] of Object.entries(inputs)) patch[k] = Number(inp.value);
            hint.textContent = "saving…"; hint.className = "res-hint";
            try { await api("/api/limits", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ limits: patch }) });
              hint.textContent = "saved (clamped to allowed range)"; hint.className = "res-hint ok"; load();
            } catch (e) { hint.textContent = e.message; hint.className = "res-hint err"; }
          } });
          return el("div", { class: "res-group" }, [
            el("h3", {}, ["Resource limits ", el("span", { class: "badge on", text: "#5" })]),
            el("p", { class: "desc", text: "Generous defaults, clamped server-side. Applied per app run and per capability." }),
            grid, el("div", { class: "res-actions" }, [save, hint])
          ]);
        }

        // Egress allowlist editor (the "fetch" capability's config).
        function egressEditor(hosts) {
          const ta = el("textarea", { rows: "3", placeholder: "api.example.com\n(one host per line)" });
          ta.value = (hosts || []).join("\n");
          const hint = el("span", { class: "res-hint" });
          const save = el("button", { text: "Save allowlist", onclick: async () => {
            const allow = ta.value.split("\n").map((s) => s.trim()).filter(Boolean);
            hint.textContent = "saving…"; hint.className = "res-hint";
            try { await api("/api/egress", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ allow }) });
              hint.textContent = "saved"; hint.className = "res-hint ok"; load();
            } catch (e) { hint.textContent = e.message; hint.className = "res-hint err"; }
          } });
          return el("div", {}, [
            el("div", { class: "res-field" }, [el("label", { text: "Allowed hosts (requestFetch can only reach these)" }), ta]),
            el("div", { class: "res-actions" }, [save, hint])
          ]);
        }

        // Secrets editor (names + readable flag; values are write-only).
        function secretsEditor(secrets) {
          const list = el("div", {});
          if (!secrets.length) list.append(el("p", { class: "res-hint", text: "No secrets set." }));
          for (const s of secrets) {
            const del = el("button", { class: "ghost", text: "delete", onclick: async () => {
              if (!confirm(`Delete secret "${s.name}"?`)) return;
              await api("/api/secrets", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ name: s.name, delete: true }) });
              load();
            } });
            list.append(el("div", { class: "secret-row" }, [
              el("span", {}, [s.name + " ", el("span", { class: "badge " + (s.readable ? "ok" : ""), text: s.readable ? "readable" : "use-only" })]),
              del
            ]));
          }
          const name = el("input", { placeholder: "NAME" });
          const value = el("input", { placeholder: "value", type: "password" });
          const readable = el("input", { type: "checkbox" });
          const hint = el("span", { class: "res-hint" });
          const add = el("button", { text: "Add / update", onclick: async () => {
            hint.textContent = "saving…"; hint.className = "res-hint";
            try { await api("/api/secrets", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ name: name.value.trim(), value: value.value, readable: readable.checked }) });
              hint.textContent = "saved"; hint.className = "res-hint ok"; load();
            } catch (e) { hint.textContent = e.message; hint.className = "res-hint err"; }
          } });
          return el("div", {}, [
            list,
            el("div", { class: "res-field", style: "margin-top:8px;" }, [el("label", { text: "Add or overwrite a secret (value never leaves the server)" }),
              el("div", { class: "row" }, [name, value]),
              el("label", { class: "res-hint", style: "display:flex;gap:6px;align-items:center;margin-top:6px;" }, [readable, "app may read the raw value"])]),
            el("div", { class: "res-actions" }, [add, hint])
          ]);
        }

        // Email policy editor.
        function emailEditor(policy, usage) {
          const from = el("textarea", { rows: "2", placeholder: "noreply@example.com" });
          from.value = (policy.allowedFrom || []).join("\n");
          const recips = el("textarea", { rows: "2", placeholder: "example.com  |  *.example.com  |  a@example.com  (blank = any)" });
          recips.value = (policy.allowRecipients || []).join("\n");
          const def = el("input", { placeholder: "default sender (optional)", value: policy.defaultFrom || "" });
          const name = el("input", { placeholder: "From display name (optional)", value: policy.fromName || "" });
          const hint = el("span", { class: "res-hint" });
          const save = el("button", { text: "Save email policy", onclick: async () => {
            const p = {
              allowedFrom: from.value.split("\n").map((s) => s.trim()).filter(Boolean),
              allowRecipients: recips.value.split("\n").map((s) => s.trim()).filter(Boolean),
              defaultFrom: def.value.trim(), fromName: name.value.trim()
            };
            hint.textContent = "saving…"; hint.className = "res-hint";
            try { await api("/api/email", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ policy: p }) });
              hint.textContent = "saved"; hint.className = "res-hint ok"; load();
            } catch (e) { hint.textContent = e.message; hint.className = "res-hint err"; }
          } });
          return el("div", {}, [
            el("p", { class: "res-hint", text: `Sent today: ${usage.sentToday} / ${usage.cap} (cap is the "Email per day" limit above).` }),
            el("div", { class: "res-field" }, [el("label", { text: "Allowed senders (From must be one of these)" }), from]),
            el("div", { class: "res-field" }, [el("label", { text: "Allowed recipients (blank = any)" }), recips]),
            el("div", { class: "res-field" }, [el("label", { text: "Default sender" }), def]),
            el("div", { class: "res-field" }, [el("label", { text: "From display name" }), name]),
            el("div", { class: "res-actions" }, [save, hint])
          ]);
        }

        // One card per capability from the catalog.
        function capGroup(cap, r) {
          const badges = [];
          badges.push(el("span", { class: "badge " + (cap.available ? "ok" : "off"), text: cap.available ? "available" : "reserved" }));
          if (cap.declared) badges.push(el("span", { class: "badge on", text: "used by app" }));
          const head = el("h3", {}, [cap.label + " ", ...badges]);
          const kids = [head, el("p", { class: "desc", text: cap.summary })];
          if (cap.id === "fetch") kids.push(egressEditor(r.egress));
          else if (cap.id === "secrets") kids.push(secretsEditor(r.secrets));
          else if (cap.id === "email") kids.push(emailEditor(r.email, r.emailUsage));
          return el("div", { class: "res-group" }, kids);
        }

        async function load() {
          status("loading…");
          const body = $("resBody");
          try {
            const r = await api("/api/resources");
            body.innerHTML = "";
            body.append(limitsGroup(r.limits));
            for (const cap of r.capabilities) body.append(capGroup(cap, r));
            status("app: " + r.templateId, "ok");
          } catch (e) {
            body.textContent = "error: " + e.message;
            status("error", "err");
          }
        }
        return { load };
      })();

      (async () => { await syncAll(); })();
    </script>
  </body>
</html>
